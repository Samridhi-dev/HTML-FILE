<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		div {
		    display: none;
		}		    
		.aa:hover + .ap {
		    display: block;
		}
	</style>
</head>
<body>
	<a class="aa">Hover over me!</a>
	<div class="ap">Stuff shown on hover</div>
</body>
</html>
