<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style type="text/css">
		*{
			margin: 0px;
			padding: 0px;
			box-sizing: border-box;
			font-family: verdana;
		}
		.shopnow{
			width: 85%;
			height: 200vh;
			margin: auto;
/*			border: 1px solid black;*/
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		.left{
			width: 42%;
			height: 85vh;
			margin-top: 20%;
/*			border: 1px solid green;*/
		}
		.right{
			width: 50%;
			height: 170vh;
/*			border: 1px solid red;*/
		}
		.clothing{
			position: relative;
			top: -50%;
			left: -39%;
		}
		.divtop{
			width: 100%;
			height: 85vh;
/*			border: 1px solid orange;*/
		}
		.divbottom{
			width: 100%;
			height: 85vh;
/*			border: 1px solid green;*/
		}
		.clothing1{
/*			border: 1px solid green;*/
			position: absolute;
			top: 130%;
			left: 44%;
		}
		h2{
			font-size: 35px;
			font-weight: 500;
		}
		a{
			text-decoration: none;
			font-size: 12px;
			letter-spacing: 5px;
			color: black;
		}
		/*a:hover{
			border-bottom: 2px solid red;
		}*/
		.brdr{
			border-top: 2px solid black;
			margin-top: 6px;
		   	width: 46%;
		   	cursor: pointer;
		   	transition: 0.2s;	   	
		}
		.brdr1{
			border-top: 2px solid black;
			margin-top: 6px;
		   	width: 22%;
		   	cursor: pointer;
		   	transition: 0.2s;
		}
		.brdr1:hover{
			border-top: 2px solid red;
			margin-top: 6px;
		   	width: 8%;
		   	cursor: pointer;
		}
		.brdr:hover{
			border-top: 2px solid red;
			margin-top: 6px;
		   	width: 23%;
		   	cursor: pointer;
		}
	</style>
</head>
<body>
	<div class="shopnow">
		<div class="left">
			<img src="images/banner-2.jpg">
			<div class="access">
				<h2>Accessories</h2>
				<a href="#">SHOP NOW</a>
				<div class="brdr1"></div>
			</div>
		</div>
		<div class="right">
			<div class="divtop">
				<img src="images/banner-1.jpg">
				<div class="clothing">
					<h2>Clothing<br>Collections 2030</h2>
					<a href="#">SHOP NOW</a>
					<div class="brdr1"></div>
				</div>
			</div>
			<div class="divbottom">
				<img src="images/banner-3.jpg" style="float:right;">
				<div class="clothing1">
					<h2>Shoes Spring<br>2030</h2>
					<a href="#">SHOP NOW</a>
					<div class="brdr"></div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
